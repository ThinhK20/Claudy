name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles nsis --config src-tauri/tauri.bundle.windows.conf.json'
          - platform: ubuntu-24.04
            args: '--bundles deb,appimage'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            build-essential \
            cmake \
            libclang-dev \
            libasound2-dev

      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ort statically links ONNX Runtime but dynamically links DirectML.dll.
      # A plain release build makes ort download its prebuilt binaries and copy
      # DirectML.dll next to the exe; we stage it at src-tauri/DirectML.dll so
      # tauri.windows.conf.json can bundle it beside claudy.exe in the installer.
      - name: Stage DirectML.dll (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cargo build --release --manifest-path src-tauri/Cargo.toml
          Copy-Item src-tauri/target/release/DirectML.dll src-tauri/DirectML.dll -Force

      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Claudy ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform below.

            - **Windows:** `.exe` (NSIS, per-user install, no admin needed)
            - **Linux:** `.deb` / `.AppImage` (unsigned, untested)

            On first run, download the speech and voice models from the app's
            Settings before using dictation or the spoken assistant.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
